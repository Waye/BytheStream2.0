<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>溪水旁 Xishuipang</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root,[data-theme="light"]{--bg-canvas:#f5f3ec;--bg-surface:#ebe8dd;--bg-elevated:#fffdf6;--text-primary:#1a2438;--text-secondary:#4a5369;--text-muted:#8a91a4;--border:#d8d4c3;--border-soft:#e2ded0;--surface-btn:#e2ded0;--surface-circle:#d8d4c3;--brand:#1a2438;--brand-hover:#0f1829;--brand-soft:#dcd9c9;--on-brand:#f5f3ec;--grad-a:#1a2438;--grad-b:#2a3652;--grad-c:#4a5574;--danger:#9e2020;--shadow:0 1px 2px rgba(26,36,56,.06)}
[data-theme="dark"]{--bg-canvas:#1a2438;--bg-surface:#222e47;--bg-elevated:#2a3652;--text-primary:#f5f3ec;--text-secondary:#b8bdcc;--text-muted:#7a8299;--border:#354263;--border-soft:#2a3652;--surface-btn:#2a3652;--surface-circle:#354263;--brand:#f5f3ec;--brand-hover:#ffffff;--brand-soft:#354263;--on-brand:#1a2438;--grad-a:#2a3652;--grad-b:#3a4870;--grad-c:#5a6b94;--danger:#e87575;--shadow:0 1px 2px rgba(0,0,0,.4)}
[data-theme="sepia"]{--bg-canvas:#f4ecd8;--bg-surface:#ebe3c9;--bg-elevated:#f8f1de;--text-primary:#2a1f14;--text-secondary:#5c4a33;--text-muted:#8a7559;--border:#d6c9a5;--border-soft:#e0d5b8;--surface-btn:#e0d5b8;--surface-circle:#d6c9a5;--brand:#1a2438;--brand-hover:#0f1829;--brand-soft:#e0dccc;--on-brand:#f5f3ec;--grad-a:#1a2438;--grad-b:#2a3652;--grad-c:#4a5574;--danger:#b91c1c;--shadow:0 1px 2px rgba(42,31,20,.06)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:"Pin Sans",-apple-system,system-ui,"Segoe UI",Roboto,"Helvetica Neue","ヒラギノ角ゴ Pro W3",メイリオ,Arial,sans-serif;background:var(--bg-canvas);color:var(--text-primary);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
button{font-family:inherit;cursor:pointer;border:none;color:inherit;background:transparent}
::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-track{background:transparent}
.btn-primary{background:var(--brand);color:var(--on-brand);padding:8px 18px;border-radius:16px;font-size:13px;font-weight:600}
.btn-primary:hover{background:var(--brand-hover)}
.btn-secondary{background:var(--surface-btn);color:var(--text-primary);padding:8px 18px;border-radius:16px;font-size:13px;font-weight:600}
.btn-circle{width:38px;height:38px;border-radius:50%;background:var(--surface-circle);color:var(--text-primary);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.btn-circle:hover{background:var(--brand-soft)}
.btn-circle.active{background:var(--brand);color:var(--on-brand)}
header.nav{position:sticky;top:0;z-index:50;background:var(--bg-canvas);border-bottom:1px solid var(--border-soft);padding:14px 32px;display:flex;align-items:center;gap:20px}
.logo{font-size:24px;font-weight:700;color:var(--brand);letter-spacing:2px;cursor:pointer;flex-shrink:0;font-family:"STKaiti","Kaiti SC","KaiTi","楷体",serif}
.search{flex:1;max-width:560px;margin:0 auto;background:var(--bg-surface);border:1px solid var(--border-soft);border-radius:16px;padding:11px 18px;font-size:14px;color:var(--text-primary);outline:none}
.search::placeholder{color:var(--text-muted)}

.theme-switch{display:flex;gap:4px;padding:4px;background:var(--bg-surface);border-radius:14px;border:1px solid var(--border-soft)}

.theme-switch button.active{background:var(--bg-elevated);color:var(--text-primary);font-weight:700;box-shadow:var(--shadow)}
main{max-width:1320px;margin:0 auto;padding:32px 32px 180px}
.announce{position:relative;border-radius:24px;overflow:hidden;aspect-ratio:3.2/1;background:var(--bg-surface);margin-bottom:16px}
.announce .slides{display:flex;width:100%;height:100%;transition:transform .6s ease}
.announce .slide{min-width:100%;height:100%;padding:48px 56px;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(135deg,var(--grad-a) 0%,var(--grad-b) 60%,var(--grad-c) 100%);color:#fff;position:relative}
.announce .slide::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 85% 15%,rgba(255,255,255,.2),transparent 55%)}
.announce .slide .tag{position:relative;display:inline-block;padding:5px 12px;border-radius:12px;background:rgba(255,255,255,.18);font-size:12px;font-weight:600;width:fit-content}
.announce .slide h2{position:relative;font-size:44px;font-weight:700;line-height:1.1;letter-spacing:-1.2px;margin-top:16px}
.announce .slide p{position:relative;font-size:15px;margin-top:12px;opacity:.9;max-width:520px;line-height:1.5}
.dots{position:absolute;bottom:18px;left:56px;display:flex;gap:6px;z-index:2}
.dots span{width:22px;height:4px;border-radius:2px;background:rgba(255,255,255,.4);cursor:pointer;transition:background .2s}
.dots span.active{background:#fff}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;margin:44px 0 18px}
.section-head h2{font-size:26px;font-weight:700;letter-spacing:-1.1px}
.section-head .link{font-size:13px;color:var(--text-secondary);font-weight:600;cursor:pointer}
.section-head .link:hover{color:var(--brand)}
.row{display:flex;gap:18px;overflow-x:auto;padding:4px 2px 16px;scroll-snap-type:x proximity}
.row>*{scroll-snap-align:start;flex-shrink:0}
.article-card{width:220px;background:var(--bg-elevated);border-radius:16px;padding:14px;border:1px solid var(--border-soft);transition:all .2s}
.article-card:hover{background:var(--bg-surface);transform:translateY(-2px)}
.article-card .thumb{width:100%;aspect-ratio:1/1;border-radius:12px;background:linear-gradient(135deg,var(--grad-a),var(--grad-c));display:flex;align-items:center;justify-content:center;color:#fff;font-size:36px;font-weight:700;margin-bottom:12px;position:relative;overflow:hidden;cursor:pointer}
.article-card .thumb::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.15),transparent 60%)}
.article-card h3{font-size:14px;font-weight:700;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer;min-height:38px}
.article-card span.author{display:block;margin-top:4px;font-size:12px;color:var(--text-secondary)}
.card-actions{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-soft)}
.card-actions button{flex:1;height:34px;border-radius:10px;background:var(--bg-surface);font-size:14px;color:var(--text-secondary);transition:all .15s;display:flex;align-items:center;justify-content:center}
.card-actions button:hover{background:var(--brand-soft);color:var(--brand)}
.card-actions button.fav-active{background:var(--brand);color:var(--on-brand)}
.card-actions button.play-btn{background:var(--brand);color:var(--on-brand)}
.card-actions button.play-btn:hover{background:var(--brand-hover)}
.volume-card{width:180px;cursor:pointer}
.volume-card .cover{width:100%;aspect-ratio:3/4;border-radius:14px;background:linear-gradient(160deg,var(--grad-a) 0%,var(--grad-b) 50%,var(--grad-c) 100%);display:flex;flex-direction:column;justify-content:space-between;padding:16px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden}
.volume-card .cover::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 10%,rgba(255,255,255,.18),transparent 50%)}
.volume-card .cover .num{font-size:42px;font-weight:700;letter-spacing:-2px;line-height:1;position:relative}
.volume-card .cover .title{font-size:13px;font-weight:600;opacity:.92;position:relative}
.volume-card .info{margin-top:12px;padding:0 4px}
.volume-card .info h4{font-size:13px;font-weight:700}
.volume-card .info span{font-size:11px;color:var(--text-secondary)}
.fav-card{width:280px;background:var(--bg-elevated);border-radius:16px;padding:14px;display:flex;gap:14px;align-items:center;cursor:pointer;border:1px solid var(--border-soft);transition:all .2s}
.fav-card:hover{background:var(--bg-surface)}
.fav-card .mini-thumb{width:56px;height:56px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,var(--grad-a),var(--grad-c));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px}
.fav-card h4{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-card p{font-size:11px;color:var(--text-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-empty{padding:40px;text-align:center;color:var(--text-muted);background:var(--bg-surface);border-radius:16px;font-size:14px}
.reader{max-width:720px;margin:0 auto}
.reader h1{font-size:42px;font-weight:700;letter-spacing:-1px;line-height:1.15;margin-top:16px}
.reader .byline{margin-top:14px;font-size:14px;color:var(--text-secondary)}
.reader-toolbar{display:flex;gap:10px;margin-top:24px;padding:16px;background:var(--bg-surface);border-radius:16px;align-items:center}
.reader-toolbar .grow{flex:1}
.reader .body{margin-top:32px;font-size:18px;line-height:1.8}
.reader .body p{margin-bottom:1.2em}
.back-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-bar .title{font-size:13px;color:var(--text-secondary);font-weight:600}
.badge{display:inline-block;padding:5px 12px;border-radius:12px;background:var(--brand-soft);font-size:12px;color:var(--brand);font-weight:600}
/* 期刊详情(Spotify专辑式) */
.volume-hero{display:flex;gap:32px;align-items:flex-end;padding:32px 0;margin-bottom:24px}
.volume-hero .big-cover{width:220px;height:293px;border-radius:16px;background:linear-gradient(160deg,var(--grad-a) 0%,var(--grad-b) 50%,var(--grad-c) 100%);color:#fff;padding:24px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 20px 40px -10px rgba(30,58,138,.3);flex-shrink:0;position:relative;overflow:hidden}
.volume-hero .big-cover::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 10%,rgba(255,255,255,.18),transparent 50%)}
.volume-hero .big-cover .num{font-size:72px;font-weight:700;letter-spacing:-3px;line-height:1;position:relative}
.volume-hero .big-cover .title{font-size:14px;font-weight:600;position:relative;opacity:.95}
.volume-hero .info .kicker{font-size:12px;font-weight:600;text-transform:uppercase;color:var(--text-secondary);letter-spacing:1px}
.volume-hero .info h1{font-size:48px;font-weight:700;letter-spacing:-1.5px;line-height:1.05;margin-top:8px}
.volume-hero .info .meta{margin-top:16px;font-size:14px;color:var(--text-secondary)}
.volume-hero .info .play-all{margin-top:20px;display:flex;gap:12px}
.track-list{margin-top:8px}
.track-row{display:grid;grid-template-columns:40px 1fr auto auto;gap:16px;align-items:center;padding:12px 14px;border-radius:10px;cursor:pointer;transition:background .15s}
.track-row:hover{background:var(--bg-surface)}
.track-row .idx{font-size:14px;color:var(--text-muted);text-align:center}
.track-row:hover .idx{color:var(--brand)}
.track-row h4{font-size:15px;font-weight:600;line-height:1.3}
.track-row p{font-size:12px;color:var(--text-secondary);margin-top:3px}
.track-row .dur{font-size:13px;color:var(--text-muted)}
.track-row .row-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.track-row:hover .row-actions{opacity:1}
.track-row .row-actions button{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-secondary)}
.track-row .row-actions button:hover{background:var(--brand-soft);color:var(--brand)}
.track-row .row-actions button.fav-active{color:var(--brand)}
/* 队列管理页 */
.queue-page{max-width:820px;margin:0 auto}
.queue-page h1{font-size:36px;font-weight:700;letter-spacing:-1px;margin-bottom:8px}
.queue-page .sub{font-size:14px;color:var(--text-secondary);margin-bottom:28px}
.queue-item{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border-soft);margin-bottom:8px;transition:all .15s}
.queue-item:hover{background:var(--bg-surface)}
.queue-item.current{background:var(--brand-soft);border-color:var(--brand)}
.queue-item .drag{cursor:grab;color:var(--text-muted);font-size:16px;user-select:none}
.queue-item .qthumb{width:44px;height:44px;border-radius:8px;background:linear-gradient(135deg,var(--grad-a),var(--grad-c));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.queue-item .qinfo{flex:1;min-width:0}
.queue-item .qinfo h4{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.queue-item .qinfo p{font-size:12px;color:var(--text-secondary);margin-top:2px}
.queue-item .qact{display:flex;gap:4px}
.queue-item .qact button{width:30px;height:30px;border-radius:50%;font-size:13px;color:var(--text-secondary)}
.queue-item .qact button:hover{background:var(--bg-canvas);color:var(--brand)}
.queue-item .qact button.del:hover{color:var(--danger)}
/* Mini Player */
.player{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg-elevated);border-top:1px solid var(--border-soft);padding:14px 24px;display:flex;align-items:center;gap:16px;backdrop-filter:blur(12px)}
.player .cover{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,var(--grad-a),var(--grad-c));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;flex-shrink:0}
.player .info{flex:1;min-width:0;max-width:240px}
.player .info h4{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player .info p{font-size:12px;color:var(--text-secondary)}
.player .controls{display:flex;align-items:center;gap:8px}
.play-main{width:44px;height:44px;border-radius:50%;background:var(--brand);color:var(--on-brand);display:flex;align-items:center;justify-content:center;font-size:15px}
.play-main:hover{background:var(--brand-hover)}
.progress{flex:1;height:4px;border-radius:2px;background:var(--border);position:relative;max-width:360px;margin:0 16px}
.progress .fill{position:absolute;left:0;top:0;bottom:0;width:35%;background:var(--brand);border-radius:2px}
.time{font-size:12px;color:var(--text-secondary);min-width:80px;text-align:right}
.queue-btn{position:relative}
.queue-btn .badge-num{position:absolute;top:-2px;right:-2px;background:var(--brand);color:var(--on-brand);font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px;min-width:16px;text-align:center}
/* 搜索下拉 */
.search-dropdown{position:absolute;top:100%;left:0;right:0;margin-top:6px;background:var(--bg-elevated);border:1px solid var(--border-soft);border-radius:14px;box-shadow:0 10px 30px -5px rgba(15,26,58,.15);overflow:hidden;z-index:60}
.search-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .15s}
.search-item:hover{background:var(--bg-surface)}
.search-item h4{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-item p{font-size:11px;color:var(--text-secondary);margin-top:2px}
.search-all{justify-content:center;font-size:13px;font-weight:600;color:var(--brand);border-top:1px solid var(--border-soft)}
/* 网格页 */
.grid-page h1{font-size:36px;font-weight:700;letter-spacing:-1px;margin-bottom:6px}
.grid-page .sub{font-size:14px;color:var(--text-secondary);margin-bottom:28px}
.vol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:24px}
.fav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.load-sentinel{height:40px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px;margin:20px 0}
.fav-list-card{background:var(--bg-elevated);border:1px solid var(--border-soft);border-radius:14px;padding:14px;display:flex;gap:14px;align-items:center;transition:all .2s}
.fav-list-card:hover{background:var(--bg-surface)}
.fav-list-card .mini-thumb{width:52px;height:52px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,var(--grad-a),var(--grad-c));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
.fav-list-card .info{flex:1;min-width:0;cursor:pointer}
.fav-list-card h4{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-list-card p{font-size:12px;color:var(--text-secondary);margin-top:3px}
.fav-list-card .del{width:34px;height:34px;border-radius:50%;background:var(--bg-surface);color:var(--text-muted);font-size:14px;display:flex;align-items:center;justify-content:center}
.fav-list-card .del:hover{background:var(--danger);color:#fff}
/* 登录 */
.login-box{max-width:420px;margin:40px auto;padding:40px;background:var(--bg-elevated);border:1px solid var(--border-soft);border-radius:24px}
.login-box h1{font-size:32px;font-weight:700;letter-spacing:-1px;text-align:center}
.login-box .sub{text-align:center;font-size:14px;color:var(--text-secondary);margin-top:8px;margin-bottom:28px}
.login-box .field{display:block;width:100%;padding:12px 16px;border-radius:14px;border:1px solid var(--border);background:var(--bg-canvas);color:var(--text-primary);font-size:14px;margin-bottom:12px;outline:none;font-family:inherit}
.login-box .field:focus{border-color:var(--brand)}
.login-box .full-btn{width:100%;padding:13px;border-radius:14px;background:var(--brand);color:var(--on-brand);font-size:14px;font-weight:600;margin-top:8px}
.login-box .divider{text-align:center;margin:24px 0;position:relative;color:var(--text-muted);font-size:12px}
.login-box .divider::before,.login-box .divider::after{content:"";position:absolute;top:50%;width:40%;height:1px;background:var(--border-soft)}
.login-box .divider::before{left:0}.login-box .divider::after{right:0}
.login-box .oauth{display:flex;gap:10px}
.login-box .oauth button{flex:1;padding:11px;border-radius:14px;border:1px solid var(--border);background:var(--bg-canvas);font-size:13px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;justify-content:center;gap:8px}
.login-box .oauth button:hover{background:var(--bg-surface)}
/* 用户中心 */
.profile-head{display:flex;gap:20px;align-items:center;padding:28px 0;margin-bottom:16px;border-bottom:1px solid var(--border-soft)}
.profile-head .avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--grad-a),var(--grad-c));color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700}
.profile-head h1{font-size:28px;font-weight:700;letter-spacing:-.5px}
.profile-head p{font-size:14px;color:var(--text-secondary);margin-top:4px}
.profile-section{margin-top:32px}
.profile-section h2{font-size:20px;font-weight:700;margin-bottom:14px}
@media(max-width:720px){.login-box{margin:20px 8px;padding:28px 22px}.profile-head{flex-direction:column;text-align:center}.fav-grid{grid-template-columns:1fr}}
@media(max-width:720px){header.nav{padding:12px 16px;gap:12px;flex-wrap:wrap}.search{order:3;width:100%;max-width:none;flex-basis:100%}.theme-switch button{padding:6px 8px;font-size:11px}main{padding:20px 16px 200px}.announce{aspect-ratio:2.2/1}.announce .slide{padding:28px 24px}.announce .slide h2{font-size:26px}.announce .slide p{font-size:13px}.dots{left:24px}.section-head h2{font-size:22px}.article-card{width:170px}.fav-card{width:240px}.volume-card{width:140px}.volume-hero{flex-direction:column;align-items:flex-start;gap:20px}.volume-hero .big-cover{width:160px;height:213px}.volume-hero .info h1{font-size:32px}.reader h1{font-size:30px}.player{padding:10px 14px;gap:10px;flex-wrap:wrap}.player .info{max-width:none;flex:1}.progress{order:5;flex-basis:100%;max-width:none;margin:8px 0 0}.time{display:none}.track-row{grid-template-columns:30px 1fr auto;gap:10px;padding:10px}.track-row .dur{display:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useSyncExternalStore,useRef}=React;

/* ========== 极简全局 store (useSyncExternalStore) ========== */
const createStore=(init)=>{
  let state=init;const listeners=new Set();
  return{
    get:()=>state,
    set:(fn)=>{state=typeof fn==="function"?fn(state):{...state,...fn};listeners.forEach(l=>l())},
    sub:(l)=>{listeners.add(l);return()=>listeners.delete(l)}
  };
};
const store=createStore({theme:"light",favs:new Set(),queue:[],currentIdx:0,playing:false});
const useStore=(sel)=>useSyncExternalStore(store.sub,()=>sel(store.get()));
const actions={
  setTheme:(t)=>store.set({theme:t}),
  toggleFav:(id)=>store.set(s=>{const f=new Set(s.favs);f.has(id)?f.delete(id):f.add(id);return{favs:f}}),
  enqueue:(item)=>store.set(s=>({queue:[...s.queue,item]})),
  playNow:(item)=>store.set(s=>{
    const exists=s.queue.findIndex(q=>q.id===item.id);
    if(exists>=0)return{currentIdx:exists,playing:true};
    return{queue:[...s.queue,item],currentIdx:s.queue.length,playing:true};
  }),
  togglePlay:()=>store.set(s=>({playing:!s.playing})),
  next:()=>store.set(s=>({currentIdx:Math.min(s.currentIdx+1,s.queue.length-1),playing:true})),
  prev:()=>store.set(s=>({currentIdx:Math.max(s.currentIdx-1,0),playing:true})),
  removeFromQueue:(idx)=>store.set(s=>{
    const q=s.queue.filter((_,i)=>i!==idx);
    let ci=s.currentIdx;
    if(idx<ci)ci--;else if(idx===ci)ci=Math.min(ci,q.length-1);
    return{queue:q,currentIdx:Math.max(0,ci)};
  }),
  moveQueue:(from,to)=>store.set(s=>{
    const q=[...s.queue];const[it]=q.splice(from,1);q.splice(to,0,it);
    let ci=s.currentIdx;
    if(from===ci)ci=to;else if(from<ci&&to>=ci)ci--;else if(from>ci&&to<=ci)ci++;
    return{queue:q,currentIdx:ci};
  }),
};

/* ========== Hash 路由 ========== */
const useRoute=()=>{
  const[route,setRoute]=useState(location.hash.slice(1)||"/");
  useEffect(()=>{const h=()=>setRoute(location.hash.slice(1)||"/");window.addEventListener("hashchange",h);return()=>window.removeEventListener("hashchange",h)},[]);
  return[route,(r)=>location.hash=r];
};

/* ========== App ========== */
function App(){
  const theme=useStore(s=>s.theme);
  const[route,nav]=useRoute();
  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme)},[theme]);
  let page;
  if(route.startsWith("/volume/"))page=<VolumeDetail id={parseInt(route.split("/")[2])} nav={nav}/>;
  else if(route==="/queue")page=<QueuePage nav={nav}/>;
  else if(route.startsWith("/article/"))page=<Reader id={parseInt(route.split("/")[2])} nav={nav}/>;
  else if(route==="/volumes")page=<AllVolumes nav={nav}/>;
  else if(route==="/favorites")page=<FavoritesPage nav={nav}/>;
  else if(route.startsWith("/search"))page=<SearchResults route={route} nav={nav}/>;
  else if(route==="/login")page=<Login nav={nav}/>;

}

/* ========== 公告栏轮播 ========== */
function Announce(){
  const[idx,setIdx]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setIdx(i=>(i+1)%ANNOUNCES.length),5000);return()=>clearInterval(t)},[]);
  return(
    <div className="announce">
      <div className="slides" style={{transform:`translateX(-${idx*100}%)`}}>
        {ANNOUNCES.map((a,i)=>(
          <div key={i} className="slide">
            <span className="tag">{a.tag}</span>
            <h2>{a.title}</h2>
            <p>{a.desc}</p>
          </div>
        ))}
      </div>
      <div className="dots">
        {ANNOUNCES.map((_,i)=>(
          <span key={i} className={i===idx?"active":""} onClick={()=>setIdx(i)}/>
        ))}
      </div>
    </div>
  );
}

/* ========== 懒加载 hook ========== */
function useLazyLoad(total,batch=6){
  const[count,setCount]=useState(batch);
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||count>=total)return;
    const io=new IntersectionObserver(es=>{
      if(es[0].isIntersecting)setCount(c=>Math.min(c+batch,total));
    },{rootMargin:"120px"});
    io.observe(ref.current);
    return()=>io.disconnect();
  },[count,total]);
  return[count,ref];
}

    <div className="login-box">
      <h1>欢迎回到溪水旁</h1>
      <div className="sub">登录后可同步你的收藏、阅读进度与播放队列</div>
      <input className="field" type="email" placeholder="邮箱地址"/>
      <input className="field" type="password" placeholder="密码"/>
      <button className="full-btn" onClick={()=>nav("/profile")}>登录</button>
      <div className="divider">或使用第三方登录</div>
      <div className="oauth">
        <button onClick={()=>nav("/profile")}>🔵 Google</button>
        <button onClick={()=>nav("/profile")}>🍎 Apple</button>
      </div>
      <div style={{textAlign:"center",marginTop:20,fontSize:13,color:"var(--text-secondary)"}}>
        还没有账号? <a style={{color:"var(--brand)",fontWeight:600,cursor:"pointer"}}>免费注册</a>
      </div>
    </div>
  );
}

/* ========== 用户中心 ========== */
function Profile({nav}){
  const favs=useStore(s=>s.favs);
  const all=[...LATEST,...VOLUME_ARTICLES];
  const favList=all.filter(a=>favs.has(a.id));
  const[readList,setReadList]=useState(all.slice(0,6).map((a,i)=>({...a,readAt:`${i+1} 天前`})));
  const removeRead=(id)=>setReadList(l=>l.filter(a=>a.id!==id));
  return(
    <div className="grid-page">
      <div className="back-bar">
        <button className="btn-circle" onClick={()=>history.back()}>←</button>
        <span className="title">返回</span>
      </div>
      <div className="profile-head">
        <div className="avatar">李</div>
        <div>
          <h1>李弟兄</h1>
          <p>lichen@example.com · 已阅读 {readList.length} 篇 · 收藏 {favList.length} 篇</p>
        </div>
        <div style={{marginLeft:"auto"}}><button className="btn-secondary">编辑资料</button></div>
      </div>
      <div className="profile-section">
        <h2>近一个月阅读记录</h2>
        {readList.length===0?<div className="fav-empty">暂无阅读记录</div>:
          <div className="fav-grid">
            {readList.map(a=>(
              <div key={a.id} className="fav-list-card">
                <div className="mini-thumb">{a.title.slice(0,1)}</div>
                <div className="info" onClick={()=>nav(`/article/${a.id}`)}>
                  <h4>{a.title}</h4><p>{a.author} · 阅读于 {a.readAt}</p>
                </div>
                <button className="del" onClick={()=>removeRead(a.id)}>✕</button>
              </div>
            ))}
          </div>
        }
      </div>
      <div className="profile-section">
        <h2>我喜欢的内容 <a className="link" style={{fontSize:13,fontWeight:600,color:"var(--text-secondary)",marginLeft:12,cursor:"pointer"}} onClick={()=>nav("/favorites")}>管理 →</a></h2>
        {favList.length===0?<div className="fav-empty">还没有收藏</div>:
          <div className="fav-grid">
            {favList.slice(0,6).map(a=>(
              <div key={a.id} className="fav-list-card">
                <div className="mini-thumb">{a.title.slice(0,1)}</div>
                <div className="info" onClick={()=>nav(`/article/${a.id}`)}>
                  <h4>{a.title}</h4><p>{a.author} · 第 {a.volume} 期</p>
                </div>
                <button className="del" onClick={()=>actions.toggleFav(a.id)}>✕</button>
              </div>
            ))}
          </div>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
